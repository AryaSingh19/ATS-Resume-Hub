<!DOCTYPE html>
<html>
<head>
    <title>ATS Resume Hub</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #2563eb);
            color: white;
        }

        .header {
            text-align: center;
            padding: 20px;
        }

        .header img {
            width: 70px;
            margin-bottom: 10px;
        }

        .container {
            width: 700px;
            margin: 20px auto;
            padding: 30px;
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-size: 14px;
            opacity: 0.9;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        textarea {
            height: 80px;
        }

        input[type="file"] {
            background: white;
            color: black;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background: #1d4ed8;
            transform: scale(1.03);
        }

        .note {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="header">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    <h1>ATS Resume Hub</h1>
</div>

<div class="container">

<form action="/generate" method="POST" enctype="multipart/form-data">

    <!-- Upload Resume -->
    <label>Upload Existing Resume (PDF)</label>
    <input type="file" name="resume_file">
    <div class="note">Auto-fill works best with simple resumes</div>

    <!-- Name -->
    <label>Full Name</label>
    <input type="text" name="name" placeholder="Enter your name">

    <!-- Description -->
    <label>Professional Summary</label>
    <textarea name="description" placeholder="Write a short summary about yourself"></textarea>

    <!-- Skills -->
    <label>Skills</label>
    <input type="text" name="skills" placeholder="Python, Java, SQL">

    <!-- Education -->
    <label>Education</label>
    <input type="text" name="education" placeholder="B.Tech in Computer Science">

    <!-- Experience -->
    <label>Experience</label>
    <textarea name="experience" placeholder="Built web app, created API, managed database"></textarea>

    <!-- Projects -->
    <label>Projects</label>
    <textarea name="projects" placeholder="E-commerce site, Chat app"></textarea>

    <!-- Job Description -->
    <label>Job Description</label>
    <textarea name="job_description" placeholder="Paste job description here"></textarea>

    <!-- Template -->
    <label>Choose Template</label>
    <select name="template">
        <option value="modern">Modern</option>
        <option value="classic">Classic</option>
    </select>

    <!-- Color -->
    <label>Choose Color Theme</label>
    <select name="color">
        <option value="blue">Blue</option>
        <option value="green">Green</option>
        <option value="dark">Dark</option>
    </select>

    <button type="submit">Generate Resume 🚀</button>

</form>

</div>

</body>
</html>
